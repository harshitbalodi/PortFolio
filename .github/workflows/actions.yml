# Deploy the Vite/React portfolio to GitHub Pages.
# - Builds on every push to main (and allows manual runs).
# - Uses the official Pages actions — no gh-pages branch needed.
# - Sets the Vite `base` automatically so it works for both:
#     * Project pages   →  https://<user>.github.io/<repo>/
#     * User/Org pages  →  https://<user>.github.io/
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch: # allow manual trigger from the Actions tab

# Required for the official Pages deploy action
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; cancel superseded runs in progress
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Compute Vite base path
        id: base
        # User/org sites (repo named `<user>.github.io`) live at root → "/"
        # Everything else is a project site → "/<repo-name>/"
        run: |
          REPO="${GITHUB_REPOSITORY##*/}"
          OWNER="${GITHUB_REPOSITORY%%/*}"
          if [[ "$REPO" == "${OWNER}.github.io" ]]; then
            echo "base=/" >> "$GITHUB_OUTPUT"
          else
            echo "base=/${REPO}/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        env:
          VITE_BASE: ${{ steps.base.outputs.base }}
          # Wire your Web3Forms key as a repo secret if you've created one
          VITE_WEB3FORMS_KEY: ${{ secrets.VITE_WEB3FORMS_KEY }}
        run: npm run build

      # SPA fallback — copy index.html → 404.html so deep links work
      - name: SPA 404 fallback
        run: cp dist/index.html dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
